/* ════════════════════════════════════════════════════════════
   CONTROL LOGIC
   ════════════════════════════════════════════════════════════ */

function populateSubType(alertType) {
  const sel    = document.getElementById('sel-sub-type');
  sel.innerHTML = '';
  const keys   = alertType === 'darkweb' ? DW_ORDER : CR_ORDER;
  const labels = alertType === 'darkweb' ? DW_LABELS : CR_LABELS;
  keys.forEach(k => {
    const opt       = document.createElement('option');
    opt.value       = k;
    opt.textContent = labels[k];
    sel.appendChild(opt);
  });
}

function onAlertTypeChange() {
  const alertType = document.getElementById('sel-alert-type').value;
  const isDW      = alertType === 'darkweb';
  document.getElementById('detail-title').textContent = isDW ? 'Item Detected' : 'Change Type';
  document.getElementById('sub-label').textContent    = isDW ? 'Information type' : 'Change type';
  populateSubType(alertType);
  updatePreview();
}

function getSubject(alertType) {
  return alertType === 'darkweb'
    ? 'Your Securizone Monitoring Alert'
    : 'Your Securizone Credit Monitoring Alert';
}

function getPreheader(alertType, subType) {
  if (alertType === 'darkweb') {
    return 'We detected your ' + DARK_WEB[subType].detectedType.replace(/&#8217;/g, '\u2019') + '.';
  }
  return CREDIT[subType].preheader;
}

function buildStatusHTML(alertType, subType) {
  const pill     = (label, cls) => `<span class="status-pill${cls ? ' ' + cls : ''}">${label}</span>`;
  const typePill = alertType === 'darkweb' ? pill('Dark Web Alert') : pill('Credit Alert', 'credit');
  const subLabel = alertType === 'darkweb' ? DW_LABELS[subType] : CR_LABELS[subType];
  return typePill + '<br>' + pill(subLabel, alertType === 'credit' ? 'credit' : '');
}

function updatePreview() {
  const alertType = document.getElementById('sel-alert-type').value;
  const subType   = document.getElementById('sel-sub-type').value;

  document.getElementById('meta-subject').textContent   = getSubject(alertType);
  document.getElementById('meta-preheader').textContent = getPreheader(alertType, subType);
  document.getElementById('status-line').innerHTML      = buildStatusHTML(alertType, subType);

  const iframe   = document.getElementById('email-frame');
  iframe.srcdoc  = buildEmail({ alertType, subType });
  iframe.onload  = function () {
    try {
      const h = iframe.contentDocument.body.scrollHeight;
      iframe.style.height = Math.max(h + 20, 600) + 'px';
    } catch(e) {
      iframe.style.height = '1000px';
    }
  };
}


/* ════════════════════════════════════════════════════════════
   PDF DOWNLOAD
   ════════════════════════════════════════════════════════════ */

function buildFilename() {
  const alertType = document.getElementById('sel-alert-type').value;
  const subType   = document.getElementById('sel-sub-type').value;
  return `securizone-alert-${alertType}-${subType}.pdf`;
}

function downloadPDF() {
  const btn    = document.getElementById('btn-pdf');
  const iframe = document.getElementById('email-frame');
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (!doc || !doc.body) return;
    btn.disabled    = true;
    btn.textContent = 'Generating\u2026';
    const pw = 600;
    const ph = doc.body.scrollHeight + 100;
    html2pdf().set({
      margin:      [8, 0, 8, 0],
      filename:    buildFilename(),
      image:       { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, width: pw, scrollY: 0, useCORS: true },
      jsPDF:       { unit: 'px', format: [pw, ph], hotfixes: ['px_scaling'] }
    }).from(doc.body).save().finally(() => {
      btn.disabled    = false;
      btn.textContent = '\u2195 Download PDF';
    });
  } catch(e) {
    btn.disabled    = false;
    btn.textContent = '\u2195 Download PDF';
    alert('Could not generate PDF. Check console for details.');
  }
}

// Boot
populateSubType('darkweb');
updatePreview();
