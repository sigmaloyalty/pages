  </main>

</div>

   CONTROL LOGIC
   ════════════════════════════════════════════════════════════ */

function populateSubType(alertType) {
  const sel    = document.getElementById('sel-sub-type');
  sel.innerHTML = '';
  const keys   = alertType === 'darkweb' ? DW_ORDER : CR_ORDER;
  const source = alertType === 'darkweb' ? DARK_WEB : CREDIT;
  keys.forEach(k => {
    const opt       = document.createElement('option');
    opt.value       = k;
    opt.textContent = source[k].label;
    sel.appendChild(opt);
  });
}

function setBureau(name) {
  currentBureau = name;
  document.getElementById('btn-equifax').classList.toggle('active', name === 'Equifax');
  document.getElementById('btn-transunion').classList.toggle('active', name === 'TransUnion');
  updatePreview();
}

// Reference mobile viewport: 375\u00d7667 (iPhone SE/8 -- a common, conservative
// baseline for "how many swipes to reach the CTA" comparisons). The email's own
// responsive CSS collapses at max-width:600px, so 375px triggers the real mobile
// layout (stacked bullets, full-width images) rather than just a narrower desktop view.
const MOBILE_WIDTH = 375;
const MOBILE_VIEWPORT_H = 667;
const DESKTOP_WIDTH = 640;

function setDevice(name) {
  currentDevice = name;
  document.getElementById('btn-desktop').classList.toggle('active', name === 'desktop');
  document.getElementById('btn-mobile').classList.toggle('active', name === 'mobile');
  applyDeviceWidths();
  updatePreview();
}

function applyDeviceWidths() {
  const isMobile = currentDevice === 'mobile';
  document.getElementById('preview-label').classList.toggle('mobile', isMobile);
  document.getElementById('meta-bar').classList.toggle('mobile', isMobile);
  document.getElementById('preview-shell').classList.toggle('mobile', isMobile);
  document.getElementById('size-stat').classList.toggle('mobile', isMobile);
  document.getElementById('preview-label').textContent = isMobile
    ? 'Mobile \u2013 375px canvas (iPhone SE/8 width)'
    : 'Desktop \u2013 600px email, 640px canvas';
}

function onAlertTypeChange() {
  const alertType = document.getElementById('sel-alert-type').value;
  const isDW      = alertType === 'darkweb';
  document.getElementById('detail-title').textContent = isDW ? 'Item Detected' : 'Change Type';
  document.getElementById('sub-label').textContent    = isDW ? 'Information type' : 'Change type';
  document.getElementById('bureau-group').style.display = isDW ? 'none' : 'block';
  populateSubType(alertType);
  updatePreview();
}

function buildStatusHTML(alertType, subType) {
  const pill = (label, cls) => `<span class="status-pill${cls ? ' ' + cls : ''}">${label}</span>`;
  if (alertType === 'darkweb') {
    return pill('Dark Web Alert') + '<br>' + pill(DARK_WEB[subType].label);
  }
  return pill('Credit Alert', 'credit') + '<br>' + pill(CREDIT[subType].label, 'credit') + '<br>' + pill(currentBureau, 'credit');
}

function updatePreview() {
  const alertType = document.getElementById('sel-alert-type').value;
  const subType   = document.getElementById('sel-sub-type').value;

  let v;
  if (alertType === 'darkweb') {
    const item = DARK_WEB[subType];
    v = {
      hiddenPreheader:  item.preheader,
      headerImgSrc:     item.headerImgSrc,
      headerImgH:       item.headerImgH,
      alertLabel:       'DARK WEB MONITORING ALERT',
      headingHtml:      item.headingHtml,
      bodyPara1Html:    item.bodyPara1Html,
      bodyPara2Html:    DW_PARA2
    };
    document.getElementById('meta-subject').textContent   = 'Securizone Alert Notice';
    document.getElementById('meta-preheader').innerHTML   = item.preheader;
  } else {
    const item = CREDIT[subType];
    const headingHtml = item.headingTpl.replace('${v.bureau}', currentBureau);
    v = {
      hiddenPreheader:  item.preheader,
      headerImgSrc:     CREDIT_IMG.src,
      headerImgH:       CREDIT_IMG.h,
      alertLabel:       'CREDIT BUREAU MONITORING ALERT',
      headingHtml:      headingHtml,
      bodyPara1Html:    item.bodyPara1Html,
      bodyPara2Html:    CR_PARA2
    };
    document.getElementById('meta-subject').textContent   = 'Securizone Alert Notice';
    document.getElementById('meta-preheader').innerHTML   = item.preheader;
  }

  document.getElementById('status-line').innerHTML = buildStatusHTML(alertType, subType);

  const iframe   = document.getElementById('email-frame');
  iframe.srcdoc  = buildEmail(v);
  iframe.onload  = function () {
    try {
      const h = iframe.contentDocument.body.scrollHeight;
      iframe.style.height = Math.max(h + 20, 600) + 'px';
      updateSizeStat(h);
    } catch(e) {
      iframe.style.height = '1200px';
      document.getElementById('size-stat').textContent = 'Could not measure rendered height.';
    }
  };
}

function updateSizeStat(heightPx) {
  const stat = document.getElementById('size-stat');
  if (currentDevice === 'mobile') {
    const screens = (heightPx / MOBILE_VIEWPORT_H).toFixed(1);
    stat.innerHTML = `<b>${heightPx}px</b> tall on a 375\u00d7667 mobile viewport \u2014 `
      + `about <b>${screens} screens</b> of scrolling before reaching the footer.`
      + `<span class="stat-note">Reference viewport only (iPhone SE/8); taller phones will show slightly fewer screens.</span>`;
  } else {
    stat.innerHTML = `<b>${heightPx}px</b> tall at desktop width.`;
  }
}

/* ════════════════════════════════════════════════════════════
   PDF DOWNLOAD
   ════════════════════════════════════════════════════════════ */

function buildFilename() {
  const alertType = document.getElementById('sel-alert-type').value;
  const subType   = document.getElementById('sel-sub-type').value;
  const bureau    = alertType === 'credit' ? '-' + currentBureau.toLowerCase() : '';
  return `securizone-alert-${alertType}-${subType}${bureau}.pdf`;
}

function downloadPDF() {
  const btn    = document.getElementById('btn-pdf');
  const iframe = document.getElementById('email-frame');
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    if (!doc || !doc.body) return;
    btn.disabled    = true;
    btn.textContent = 'Generating\u2026';
    const pw = 600;
    const ph = doc.body.scrollHeight + 100;
    html2pdf().set({
      margin:      [8, 0, 8, 0],
      filename:    buildFilename(),
      image:       { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, width: pw, scrollY: 0, useCORS: true },
      jsPDF:       { unit: 'px', format: [pw, ph], hotfixes: ['px_scaling'] }
    }).from(doc.body).save().finally(() => {
      btn.disabled    = false;
      btn.textContent = '\u2195 Download PDF';
    });
  } catch(e) {
    btn.disabled    = false;
    btn.textContent = '\u2195 Download PDF';
    alert('Could not generate PDF. Check console for details.');
  }
}

// Boot
applyDeviceWidths();
populateSubType('darkweb');
updatePreview();
